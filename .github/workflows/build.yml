name: Android CI Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project source code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Generate Wrapper Binaries
      run: gradle wrapper --gradle-version 8.2

    - name: Validate Gradle Wrapper Jar Integrity
      uses: gradle/actions/wrapper-validation@v3

    - name: Grant execute permission for Gradle wrapper
      run: chmod +x gradlew

    - name: Run complete build compile check
      run: ./gradlew assembleDebug
